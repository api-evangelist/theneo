  description: >-
    The Theneo API provides programmatic access to manage API documentation projects, workspaces, user access, and API
    specification imports on the Theneo platform. Supports creating, publishing, and sharing AI-generated API
    documentation built from OpenAPI, Swagger, Postman, GraphQL, gRPC, SOAP/WSDL, and AsyncAPI specifications. Pairs
    with the @theneo/cli and @theneo/sdk npm packages and the Theneo GitHub Action for CI-driven docs updates.
