description: Machine-readable plans and pricing for the Theneo API documentation platform, derived from
  the public pricing page at https://www.theneo.io/pricing. Tiers are workspace-based; AI quotas are listed
  per workspace per month. Annual billing is shown; monthly equivalents are noted where published.
sourceUrl: https://www.theneo.io/pricing
plans:
  - id: theneo-starter
    name: Starter
    type: freemium
    description: Free entry tier intended for evaluation and small teams. Includes limited AI-assisted
      documentation generation and limited public/private projects.
    entries:
      - label: Public Projects
        description: Maximum number of public documentation projects
        name: public_projects
        type: quota
        metric: projects
        limit: 1
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Private Projects
        description: Maximum number of private documentation projects
        name: private_projects
        type: quota
        metric: projects
        limit: 2
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Team Members
        description: Maximum collaborators per workspace
        name: team_members
        type: quota
        metric: users
        limit: 20
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: GPT-Powered Search Results
        description: Monthly cap on AI-powered search responses
        name: gpt_search_results
        type: quota
        metric: search_responses
        limit: 100
        timeFrame: month
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: TheneoAI Doc Builder Assistance
        description: Monthly cap on AI Co-pilot doc generation/enhancement actions
        name: theneo_ai_actions
        type: quota
        metric: ai_actions
        limit: 2000
        timeFrame: month
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Up to 1 Public Project
      - name: Up to 2 Private Projects
      - name: Up to 20 Team Members
      - name: AI Co-pilot (Limited)
      - name: Ask AI Bot (Limited)
      - name: Community Support
  - id: theneo-business
    name: Business
    type: paid
    description: Production tier for growing teams. Adds unlimited AI usage, custom branding, custom domain,
      and SEO controls. Annual billing $120/month/workspace; monthly billing $150/month/workspace.
    entries:
      - label: Projects
        description: Maximum number of documentation projects per workspace
        name: projects
        type: quota
        metric: projects
        limit: 7
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '120.00'
        userMultiplied: false
      - label: Team Members
        description: Maximum collaborators per workspace
        name: team_members
        type: quota
        metric: users
        limit: 50
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '120.00'
        userMultiplied: false
