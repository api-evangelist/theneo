        name: search_ai
        type: quota
        metric: search_responses
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '120.00'
        userMultiplied: false
      - label: TheneoAI Doc Builder
        description: Unlimited AI Co-pilot generation and enhancement
        name: theneo_ai_actions
        type: quota
        metric: ai_actions
        limit: -1
        timeFrame: month
