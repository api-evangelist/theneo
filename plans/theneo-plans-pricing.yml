        description: Maximum number of developer hubs (multi-portal)
        name: developer_hubs
        type: quota
        metric: hubs
        limit: 20
        timeFrame: account
        geo: global
        domains:
          - https://app.theneo.io
        unit: 1
        price: '400.00'
        userMultiplied: false
      - label: Workspace Subscription (Annual)
        description: Annual-billing list price per workspace per month
        name: workspace_subscription_annual
        type: subscription
        metric: workspace
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://www.theneo.io
        unit: 1
        price: '400.00'
        userMultiplied: false
      - label: Workspace Subscription (Monthly)
        description: Month-to-month list price per workspace per month
        name: workspace_subscription_monthly
        type: subscription
        metric: workspace
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://www.theneo.io
        unit: 1
        price: '450.00'
