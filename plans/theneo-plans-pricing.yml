      - name: Custom CSS
      - name: Custom ChatGPT Prompt Configuration
      - name: Up to 20 Developer Hubs
      - name: Advanced Security & IP Whitelisting
      - name: Slack & Teams 1:1 Support
  - id: theneo-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier with self-hosting, SAML SSO and OAuth 2.0, custom roles and permissions,
      and unlimited projects/team members. Pricing on request; includes optional EU data residency.
    entries:
      - label: Projects
        description: Negotiated; unlimited subject to contract
        name: projects
        type: quota
        metric: projects
        limit: -1
        timeFrame: account
        geo: configurable
        domains:
          - https://app.theneo.io
        unit: 1
        price: custom
        userMultiplied: false
      - label: Team Members
        description: Negotiated; unlimited subject to contract
        name: team_members
        type: quota
        metric: users
        limit: -1
