    name: Growth
    type: paid
    description: Scale tier for larger documentation operations. Adds custom CSS, custom ChatGPT prompt
      configuration, multiple developer hubs, advanced security with IP whitelisting, and 1:1 Slack/Teams
      support. Annual billing $400/month/workspace; monthly billing $450/month/workspace.
    entries:
