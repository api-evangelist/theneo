        unit: 1
        price: '120.00'
        userMultiplied: false
      - label: Workspace Subscription (Monthly)
        description: Month-to-month list price per workspace per month
        name: workspace_subscription_monthly
        type: subscription
        metric: workspace
        limit: 1
        timeFrame: month
        geo: global
        domains:
          - https://www.theneo.io
        unit: 1
        price: '150.00'
        userMultiplied: false
    elements:
      - name: Everything In Starter
      - name: Up to 7 Projects
      - name: Up to 50 Team Members
      - name: Unlimited searchAI
      - name: Unlimited TheneoAI Doc Builder
      - name: Customized Branding & SEO
