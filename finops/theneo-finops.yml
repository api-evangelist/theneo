specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Theneo
providerId: theneo
publisherName: Theneo
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - API Documentation
  - Developer Portal
  - Documentation Platform
  - AI
  - AI Co-Pilot
  - Platform
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Theneo API surface. Provides a FOCUS-aligned mapping
  for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingAlternateFrequency: Annual
  billingCurrency: USD
  billingUnit: workspace
  chargeCategories:
    - Subscription
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
  notes: >-
    Theneo's published pricing is workspace-based subscription, not pure usage-based.
    Starter is free; Business is $120/month/workspace annual ($150/month monthly);
    Growth is $400/month/workspace annual ($450/month monthly); Enterprise is custom.
    AI usage is metered on Starter (100 search responses, 2,000 AI actions per month)
    and unlimited on paid tiers, so AI quota overage does not produce overage charges
    on paid tiers — instead, AI capacity is bundled into the tier.
focusColumns:
  ServiceName: Theneo
  ServiceCategory: Developer Tools / API Documentation
  ProviderName: Theneo
  PublisherName: Theneo
  InvoiceIssuerName: Theneo
  PricingCategory: Subscription
  PricingUnit: workspace-month
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: workspace_subscription
    description: Monthly workspace subscription charge by tier
    unit: workspace-month
    aggregation: sum
    dimensions:
      - tier
      - billing_cadence
      - workspace
  - name: theneo_ai_actions
    description: Count of TheneoAI Doc Builder Co-pilot actions (generation/enhancement)
    unit: ai_action
    aggregation: sum
    dimensions:
      - tier
      - workspace
      - project
  - name: search_ai_responses
    description: Count of GPT-powered search responses served (searchAI / Ask AI Bot)
    unit: response
    aggregation: sum
    dimensions:
      - tier
      - workspace
      - project
  - name: api_requests
    description: Count of billable Theneo API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
apis:
  - name: Theneo
    baseURL: https://api.theneo.io
    tags:
      - API Documentation
      - Developer Tools
      - Documentation Platform
      - AI
      - OpenAPI
    serviceName: Theneo
    serviceCategory: API
unitEconomics:
  - name: Cost per Active Project
    metric: billed_cost / active_projects
    target: TBD
  - name: Cost per Documentation Editor
    metric: billed_cost / active_editors
    target: TBD
  - name: Cost per AI Action
    metric: billed_cost / theneo_ai_actions
    target: TBD
  - name: Cost per Published Documentation Pageview
    metric: billed_cost / published_pageviews
    target: TBD
maintainers:
