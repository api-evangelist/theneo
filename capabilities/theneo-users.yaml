naftiko: 1.0.0-alpha2
info:
  label: Theneo API — Users
  description: 'Theneo API — Users. 3 operations. Lead operation: Share A Project. Self-contained Naftiko capability covering
    one Theneo business surface.'
  tags:
  - Theneo
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THENEO_API_KEY: THENEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: theneo-users
    baseUri: https://api.theneo.io
    description: Theneo API — Users business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-share
      path: /projects/{projectId}/share
      operations:
      - name: shareproject
        method: POST
        description: Share A Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The unique identifier of the project.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId-users
      path: /projects/{projectId}/users
      operations:
      - name: getaccessibleusers
        method: GET
        description: Get Accessible Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The unique identifier of the project.
          required: true
    - name: projects-projectId-users-userId
      path: /projects/{projectId}/users/{userId}
      operations:
      - name: changeuseraccess
        method: PATCH
        description: Change User Access To A Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          description: The unique identifier of the project.
          required: true
        - name: userId
          in: path
          type: string
          description: The unique identifier of the user.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.THENEO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: theneo-users-rest
    port: 8080
    description: REST adapter for Theneo API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/projects/{projectid}/share
      name: projects-projectid-share
      description: REST surface for projects-projectId-share.
      operations:
      - method: POST
        name: shareproject
        description: Share A Project
        call: theneo-users.shareproject
        with:
          projectId: rest.projectId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/users
      name: projects-projectid-users
      description: REST surface for projects-projectId-users.
      operations:
      - method: GET
        name: getaccessibleusers
        description: Get Accessible Users
        call: theneo-users.getaccessibleusers
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}/users/{userid}
      name: projects-projectid-users-userid
      description: REST surface for projects-projectId-users-userId.
      operations:
      - method: PATCH
        name: changeuseraccess
        description: Change User Access To A Project
        call: theneo-users.changeuseraccess
        with:
          projectId: rest.projectId
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: theneo-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Theneo API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: share-project
      description: Share A Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: theneo-users.shareproject
      with:
        projectId: tools.projectId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-accessible-users
      description: Get Accessible Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: theneo-users.getaccessibleusers
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
    - name: change-user-access-project
      description: Change User Access To A Project
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: theneo-users.changeuseraccess
      with:
        projectId: tools.projectId
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
