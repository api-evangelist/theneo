specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Theneo
providerId: theneo
created: '2026-05-04'
modified: '2026-05-22'
tags:
  - API Documentation
  - Developer Portal
  - Documentation Platform
  - AI
  - Platform
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Theneo API surface. Tier names track the
  public pricing page (Starter, Business, Growth, Enterprise). Theneo's published pricing emphasizes
  project, team-member, and AI-action quotas; per-minute API rate ceilings are scaffold values pending
  authoritative documentation. The Theneo security page confirms platform-level rate limiting against
  DoS attacks.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: starter
    name: Starter Public Projects
    scope: account
    metric: public_projects
    limit: 1
    timeFrame: account
    applies:
      - Theneo
  - tier: starter
    name: Starter Private Projects
    scope: account
    metric: private_projects
    limit: 2
    timeFrame: account
    applies:
      - Theneo
  - tier: starter
    name: Starter Team Members
    scope: workspace
    metric: team_members
    limit: 20
    timeFrame: account
    applies:
      - Theneo
  - tier: starter
    name: Starter GPT-Powered Search Quota
    scope: workspace
    metric: search_responses_per_month
    limit: 100
    timeFrame: month
    applies:
      - Theneo
  - tier: starter
    name: Starter TheneoAI Doc Builder Quota
    scope: workspace
    metric: ai_actions_per_month
    limit: 2000
    timeFrame: month
    applies:
      - Theneo
  - tier: starter
    name: Starter API Rate (Scaffold)
    scope: api-key
    metric: requests_per_minute
    limit: 10
    burst: 20
    timeFrame: minute
    applies:
      - Theneo
  - tier: business
    name: Business Projects
    scope: workspace
    metric: projects
    limit: 7
    timeFrame: account
    applies:
      - Theneo
  - tier: business
    name: Business Team Members
    scope: workspace
    metric: team_members
    limit: 50
    timeFrame: account
    applies:
      - Theneo
  - tier: business
    name: Business searchAI
    scope: workspace
    metric: search_responses_per_month
    limit: -1
    timeFrame: month
    applies:
      - Theneo
  - tier: business
    name: Business TheneoAI Doc Builder
    scope: workspace
    metric: ai_actions_per_month
    limit: -1
    timeFrame: month
    applies:
      - Theneo
  - tier: business
    name: Business API Rate (Scaffold)
    scope: api-key
    metric: requests_per_minute
    limit: 100
    burst: 200
    timeFrame: minute
    applies:
      - Theneo
  - tier: growth
    name: Growth Developer Hubs
    scope: workspace
    metric: developer_hubs
    limit: 20
    timeFrame: account
    applies:
      - Theneo
  - tier: growth
    name: Growth API Rate (Scaffold)
    scope: api-key
    metric: requests_per_minute
    limit: 300
    burst: 600
    timeFrame: minute
    applies:
      - Theneo
  - tier: enterprise
    name: Enterprise Projects
    scope: contract
    metric: projects
    limit: -1
    timeFrame: account
    applies:
      - Theneo
  - tier: enterprise
    name: Enterprise Team Members
    scope: contract
    metric: team_members
    limit: -1
    timeFrame: account
    applies:
      - Theneo
  - tier: enterprise
    name: Enterprise Negotiated API Rate
    scope: contract
    metric: requests_per_minute
    limit: 1000
    burst: 5000
    timeFrame: minute
    applies:
      - Theneo
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring the Retry-After header
      when present.
  - name: Burst Handling
    description: Short bursts above the steady-state limit are tolerated up to the documented burst ceiling
      before throttling engages.
  - name: Quota Reset
    description: Monthly quotas reset at the start of each calendar month in UTC. Per-minute and per-second
      windows reset on a sliding-window basis.
  - name: Fair Use
    description: Even on uncapped enterprise tiers, sustained usage that materially impacts shared infrastructure
      may be subject to fair-use throttling.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
